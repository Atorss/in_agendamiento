[options]
; ========================================
; CONFIGURACION BASICA DE ODOO
; ========================================

; Rutas de addons (separadas por comas)
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; ========================================
; BASE DE DATOS
; ========================================
db_host = db
db_port = 5432
db_user = odoo
db_password = PgWcvHk1ZfIhjttF8UNP

; ========================================
; SEGURIDAD
; ========================================
; Contraseña maestra para gestion de BD
admin_passwd = dNuQTfau6DW1bIvOgC8D

; Desactivar listado de bases de datos (produccion: gestor de BD no expuesto)
list_db = False

; ========================================
; SERVIDOR WEB
; ========================================
http_port = 8069

; Numero de workers HTTP. Servidor dedicado 8 vCPU / 23GB con BD co-localizada.
; Se dejan CPU/RAM para Postgres, gevent y cron. 9 workers ~= 50+ usuarios concurrentes.
workers = 9

; Limite de tiempo para requests (en segundos)
limit_time_cpu = 180
limit_time_real = 360

; Tamano maximo de request (en MB)
limit_request = 8192

; ========================================
; LOGGING
; ========================================
log_level = warn
logfile = None
log_handler = :WARNING

; ========================================
; RENDIMIENTO
; ========================================
; Memoria por worker: soft=1.5GB, hard=2GB
limit_memory_hard = 2147483648
limit_memory_soft = 1610612736
max_cron_threads = 2
; Conexiones por worker; 9 workers * 16 < max_connections(200) de Postgres
db_maxconn = 16

; Puerto gevent (longpolling / tiempo real). En Odoo 16+ se llama gevent_port.
gevent_port = 8072

; ========================================
; PROXY
; ========================================
proxy_mode = True

; ========================================
; DESARROLLO
; ========================================
without_demo = all
