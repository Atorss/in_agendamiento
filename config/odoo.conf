[options]
; ========================================
; CONFIGURACION BASICA DE ODOO
; ========================================

; Rutas de addons (separadas por comas)
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; ========================================
; BASE DE DATOS
; ========================================
db_host = db
db_port = 5432
db_user = odoo
db_password = PgWcvHk1ZfIhjttF8UNP

; ========================================
; SEGURIDAD
; ========================================
; Contraseña maestra para gestion de BD
admin_passwd = dNuQTfau6DW1bIvOgC8D

; Desactivar listado de bases de datos (descomentar en produccion)
; list_db = False

; ========================================
; SERVIDOR WEB
; ========================================
http_port = 8069

; Numero de workers (recomendado: 2 * CPU + 1, ajustado para multi-tenant)
workers = 4

; Limite de tiempo para requests (en segundos)
limit_time_cpu = 180
limit_time_real = 360

; Tamano maximo de request (en MB)
limit_request = 8192

; ========================================
; LOGGING
; ========================================
log_level = warn
logfile = None
log_handler = :WARNING

; ========================================
; RENDIMIENTO
; ========================================
; Memoria por worker: soft=1GB, hard=1.5GB
limit_memory_hard = 1610612736
limit_memory_soft = 1073741824
max_cron_threads = 1
db_maxconn = 32

; Longpolling para tiempo real
longpolling_port = 8072

; ========================================
; PROXY
; ========================================
proxy_mode = True

; ========================================
; DESARROLLO
; ========================================
without_demo = all
